<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今週どこまで｜学習計画 自動ペース表</title>
<script src="./xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#FBFAF7;--card:#FFFFFF;--ink:#1E2A3A;--soft:#5A6675;
    --line:#E8E4DC;--go:#0E9F6E;--goSoft:#E6F5EF;--due:#C2722E;--dueSoft:#FBF0E5;
    --sans:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo',system-ui,sans-serif;--mono:ui-monospace,'SFMono-Regular','Menlo','Consolas',monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);padding:32px 20px 64px;line-height:1.6}
  .wrap{max-width:780px;margin:0 auto}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:2px;color:var(--go);font-weight:700;margin-bottom:8px}
  h1{font-size:30px;font-weight:900;margin:0 0 12px;line-height:1.3;letter-spacing:-.5px}
  .lead{color:var(--soft);font-size:15px;margin:0 0 24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:20px}
  label.lbl{display:block;font-size:13px;font-weight:700;color:var(--soft);margin-bottom:8px}
  .drop{display:block;border:2px dashed var(--line);border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;color:var(--soft);font-size:14.5px}
  .drop b{color:var(--go)}
  input[type=file]{display:none}
  .row{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px}
  .field{flex:1 1 200px}
  input[type=date],input[type=number]{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14.5px;font-family:var(--sans);color:var(--ink);background:#fff}
  .slider-row{display:flex;align-items:center;gap:12px}
  input[type=range]{flex:1}
  .slider-val{font-family:var(--mono);font-weight:700;font-size:18px;min-width:84px;text-align:right}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:18px}
  .stat{background:#F7F6F2;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stat.accent{background:var(--goSoft);border-color:var(--go)}
  .stat .l{font-size:11.5px;color:var(--soft);font-weight:700;margin-bottom:4px}
  .stat .v{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}
  .stat.accent .v{color:var(--go)}
  .stat .s{font-size:11px;color:var(--soft);margin-top:4px}
  .hl{background:var(--ink);color:#fff;border-radius:16px;padding:22px 24px;margin-bottom:20px}
  .hl .tag{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;opacity:.7;font-weight:700;margin-bottom:10px}
  .hl .big{font-size:21px;font-weight:700;line-height:1.45}
  .hl .big em{color:#7FE8C4;font-style:normal}
  .hl .hours{margin-top:14px;display:inline-block;background:rgba(255,255,255,.12);border-radius:10px;padding:8px 14px;font-size:15px}
  .hl .hours b{font-family:var(--mono);font-size:18px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:12px;color:var(--soft);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:none}
  .wk{font-family:var(--mono);font-weight:700;color:var(--due);white-space:nowrap}
  .goal{font-weight:700}
  .goal small{display:block;color:var(--soft);font-weight:400;font-size:12.5px;margin-top:2px}
  .hh{font-family:var(--mono);text-align:right;white-space:nowrap}
  .hh.over{color:var(--due);font-weight:700}
  .note{font-size:13.5px;color:var(--soft);margin-top:14px}
  .warn{color:var(--due);font-weight:500}
  .hidden{display:none}
  .finish{margin-top:16px;padding:14px 16px;border-radius:12px;font-size:14.5px;font-weight:500}
  .finish.ok{background:var(--goSoft);color:var(--go)}
  .finish.over{background:var(--dueSoft);color:var(--due)}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">WEEKLY PACE · AUTO</div>
  <h1>今週どこまで進めるか、<br>自動で線を引く。</h1>
  <p class="lead">学習計画表(.xlsx)を入れると「1週にこなす課題数」を卒業日から逆算して自動計算し、そのペースで進めた到達ラインを引きます。達成目安日は確保できる時間から算出。あくまで目安</p>

  <div class="card">
    <label class="lbl">① 学習計画表をアップロード（.xlsx）</label>
    <label class="drop" id="drop">
      <input type="file" id="file" accept=".xlsx,.xlsm">
      <span id="dropText">クリックして .xlsx を選択</span>
    </label>

    <div id="controls" class="hidden">
      <div class="row">
        <div class="field">
          <label class="lbl">② 今週の起点日</label>
          <input type="date" id="start">
        </div>
        <div class="field">
          <label class="lbl">卒業日（自動・修正可）</label>
          <input type="date" id="grad">
        </div>
      </div>

      <div class="field" style="margin-top:16px">
        <label class="lbl">③ 週に確保できる学習時間（達成目安日の計算用）</label>
        <div class="slider-row">
          <input type="range" id="cap" min="5" max="80" step="1" value="20">
          <span class="slider-val"><span id="capOut">20</span> h/週</span>
        </div>
      </div>

      <div class="stats" id="stats"></div>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let TASKS=null, GRAD=null;

const fmt=d=>d?(d.getMonth()+1)+'/'+d.getDate():'—';
const addDays=(d,n)=>new Date(d.getTime()+n*86400000);
const toInput=d=>{const z=new Date(d.getTime()-d.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);};
const parseInput=s=>{const [y,m,dd]=s.split('-').map(Number);return new Date(y,m-1,dd);};

$('file').addEventListener('change', async e=>{
  const f=e.target.files[0]; if(!f) return;
  $('dropText').textContent='読み込み中…';
  try{
    const wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames.find(n=>n.includes('学習進捗'))||wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,cellDates:true,defval:null});

    let nameCol=-1,hoursCol=-1,headerRow=-1;
    for(let r=0;r<15;r++){const row=aoa[r]||[];for(let c=0;c<row.length;c++){const v=row[c];if(typeof v!=='string')continue;if(v.includes('課題名'))nameCol=c;if(v.includes('目安時間'))hoursCol=c;}if(nameCol>=0&&hoursCol>=0){headerRow=r;break;}}
    if(nameCol<0||hoursCol<0){fail('見出し（課題名・目安時間）が見つかりませんでした。');return;}
    const doneCol=hoursCol+2,curCol=nameCol-1;

    let grad=null;
    for(const row of aoa){for(let i=0;i<row.length;i++){const v=row[i];if(typeof v==='string'&&v.includes('卒業日')&&!v.includes('まで')&&!v.includes('目標')){for(let j=i+1;j<row.length;j++)if(row[j] instanceof Date){grad=row[j];break;}}}if(grad)break;}

    const tasks=[];
    for(let r=headerRow+1;r<aoa.length;r++){const row=aoa[r]||[];const name=row[nameCol],hours=row[hoursCol];if(!name||typeof hours!=='number'||name==='課題名')continue;
      tasks.push({cur:row[curCol]||'',name,hours,done:row[doneCol]===true||row[doneCol]==='TRUE'});}
    if(!tasks.length){fail('課題行が読み取れませんでした。');return;}

    TASKS=tasks; GRAD=grad;
    $('dropText').innerHTML='<b>✓ '+esc(f.name)+'</b>（クリックで差し替え）';
    $('controls').classList.remove('hidden');
    const today=new Date(); today.setHours(0,0,0,0);
    $('start').value=toInput(today);
    $('grad').value=grad?toInput(grad):'';

    render();
  }catch(err){fail('ファイルを読み込めませんでした。元の計画表(.xlsx)をそのままお試しください。');}
});

function fail(msg){$('dropText').textContent='クリックして .xlsx を選択';$('output').innerHTML='<div class="card" style="color:var(--due)">'+esc(msg)+'</div>';}

$('cap').addEventListener('input',()=>{$('capOut').textContent=$('cap').value;render();});
['start','grad'].forEach(id=>$(id).addEventListener('input',render));

function chunk(tasks,mode,budget){
  const weeks=[];let cur={tasks:[],h:0};
  for(const t of tasks){const next=mode==='hours'?cur.h+t.hours:cur.tasks.length+1;
    if(cur.tasks.length>0&&next>budget){weeks.push(cur);cur={tasks:[],h:0};}
    cur.tasks.push(t);cur.h+=t.hours;}
  if(cur.tasks.length)weeks.push(cur);return weeks;
}

function render(){
  if(!TASKS)return;
  const start=parseInput($('start').value);
  const grad=$('grad').value?parseInput($('grad').value):null;
  const cap=Math.max(1,+$('cap').value);

  const incomplete=TASKS.filter(t=>!t.done);
  const doneCount=TASKS.length-incomplete.length;
  const remain=Math.round(incomplete.reduce((s,t)=>s+t.hours,0)*10)/10;

  // 必要ペース（卒業日に間に合わせるのに要する週あたり時間）
  let submit=null,weeksToSubmit=null,requiredHours=null;
  if(grad){submit=addDays(grad,-7);weeksToSubmit=Math.max(0.1,(submit-start)/(7*86400000));requiredHours=Math.round(remain/weeksToSubmit*10)/10;}

  // 確保できる時間で区切る（週◯時間ぶんずつ）→ その結果、週あたり何課題こなせるかを導出
  const weeks=chunk(incomplete,'hours',cap);
  if(!weeks.length){$('output').innerHTML='<div class="card">未完了の課題はありません 🎉</div>';return;}

  let cum=0;
  weeks.forEach(w=>{cum+=w.h;w.cumH=cum;w.date=addDays(start,Math.round(cum/cap*7));});
  const finishDate=weeks[weeks.length-1].date;
  const totalWeeks=weeks.length;
  const perWeekCount=Math.max(1,Math.round(incomplete.length/totalWeeks)); // 週◯時間で終わる目安課題数

  $('stats').innerHTML=
    stat('残り課題',incomplete.length+'件',doneCount+'/'+TASKS.length+' 完了')+
    stat('残り目安時間',remain+'h','')+
    (grad?stat('卒業日まで',Math.max(0,Math.round((grad-start)/86400000))+'日','卒業 '+fmt(grad)):'')+
    (requiredHours!=null?stat('必要ペース',requiredHours+'h/週','卒業に間に合うライン'):'')+
    stat('1週の目安課題数','約'+perWeekCount+'課題','週'+cap+'時間で終わる目安',true);

  // 完了が順番通りか判定
  let nonSeq=false;{let seenInc=false;for(const t of TASKS){if(!t.done)seenInc=true;else if(seenInc){nonSeq=true;break;}}}

  const w1=weeks[0],w1last=w1.tasks[w1.tasks.length-1];
  const pctNow=Math.round(doneCount/TASKS.length*100);
  const pctAfter=Math.round((doneCount+w1.tasks.length)/TASKS.length*100);

  let html='<div class="hl">';
  html+='<div class="tag">今週やること（達成目安 '+fmt(w1.date)+'）</div>';
  html+='<div class="big">今週は <em>'+w1.tasks.length+'課題</em> 消化する<br><span style="font-size:15px;opacity:.85">「'+esc(w1last.name)+'」あたりまで</span></div>';
  html+='<div class="hours">目安 <b>'+Math.round(w1.h)+'</b> 時間 ／ 完了 '+pctNow+'% → '+pctAfter+'%</div>';
  html+='</div>';

  if(grad){
    if(finishDate<=grad){html+='<div class="finish ok">週'+cap+'時間（≒ 約'+perWeekCount+'課題/週）で進めれば完了見込み '+fmt(finishDate)+'。卒業日 '+fmt(grad)+' に間に合うペースです。</div>';}
    else{html+='<div class="finish over">卒業日 '+fmt(grad)+' に間に合わせるには <b>週 '+requiredHours+' 時間</b> 必要です。今の週'+cap+'時間だと完了見込みは '+fmt(finishDate)+'。確保時間を増やすことを検討してください。</div>';}
  }else{
    html+='<div class="finish ok">週'+cap+'時間（≒ 約'+perWeekCount+'課題/週）で完了見込み '+fmt(finishDate)+'。（卒業日が未設定です）</div>';
  }

  // 残りカリキュラム内訳（順番に依存しない総数ビュー）
  const groups=[],gmap=new Map();
  for(const t of incomplete){const k=t.cur||'(その他)';if(!gmap.has(k)){const g={cur:k,count:0,h:0};gmap.set(k,g);groups.push(g);}const g=gmap.get(k);g.count++;g.h+=t.hours;}
  html+='<div class="card"><label class="lbl">残りカリキュラム内訳（'+groups.length+'種類・'+incomplete.length+'課題・'+remain+'h）</label>';
  html+='<table><tbody>';
  groups.forEach(g=>{html+='<tr><td class="goal">'+esc(g.cur)+'</td><td class="hh">'+g.count+'課題</td><td class="hh">'+Math.round(g.h)+'h</td></tr>';});
  html+='</tbody></table>';
  if(nonSeq)html+='<div class="note warn">※完了が順番通りではありません（飛ばした課題あり）。週ごとの「ここまで」より、この残り総数を基準に見てください。</div>';
  html+='</div>';

  html+='<div class="card"><label class="lbl">到達ライン｜週'+cap+'時間で進めた場合（≒ 約'+perWeekCount+'課題/週・達成目安日も週'+cap+'時間で計算）</label>';
  html+='<table><thead><tr><th>週（達成目安）</th><th>主な内容</th><th>課題</th><th>時間</th></tr></thead><tbody>';
  let anyOver=false;
  weeks.forEach((w,i)=>{const last=w.tasks[w.tasks.length-1];const isLast=i===weeks.length-1;
    const over=w.h>cap; if(over)anyOver=true;
    html+='<tr><td class="wk">Week'+(i+1)+'<br>('+fmt(w.date)+')</td>'
      +'<td class="goal">'+esc(last.cur)+'<small>'+esc(last.name)+(isLast?'　🏁 完了見込み':'')+'</small></td>'
      +'<td class="hh">'+w.tasks.length+'</td>'
      +'<td class="hh'+(over?' over':'')+'">'+Math.round(w.h)+'h</td></tr>';});
  html+='</tbody></table>';
  html+='<div class="note">全'+totalWeeks+'週・残り'+incomplete.length+'課題。完了見込み '+fmt(finishDate)+'（週'+cap+'時間想定）。</div>';
  if(anyOver)html+='<div class="note warn">※オレンジの時間は週の確保時間（'+cap+'h）超え。その分、達成目安日を後ろにずらして計算しています。</div>';
  html+='<div class="note">※完了見込みは「目安時間を消化し切る日」です。卒業制作は提出後にエンジニアのレビュー時間が別途かかり、卒業直前は混み合うので早めの提出を。／毎週一定時間で進む前提の目安です。ズレたら確保時間を調整してください。</div>';
  html+='</div>';

  $('output').innerHTML=html;
}

function stat(l,v,s,accent){return '<div class="stat'+(accent?' accent':'')+'"><div class="l">'+l+'</div><div class="v">'+v+'</div>'+(s?'<div class="s">'+s+'</div>':'')+'</div>';}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
</script>
</body>
</html>
